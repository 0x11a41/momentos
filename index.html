<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>College Memories | Farewell 2026</title>

		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			
			body {
				background: #121212;
				background-image: radial-gradient(#2c2c2c 10%, transparent 10%);
				background-size: 20px 20px;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				color: #fff;
				padding: 20px;
			}
			
			.page-container {
				display: flex;
				flex-direction: column;
				align-items: center;
				max-width: 400px;
				width: 100%;
				position: relative;
			}
			
			.tape {
				width: 120px;
				height: 30px;
				background: rgba(255, 255, 255, 0.2);
				backdrop-filter: blur(2px);
				position: absolute;
				top: -15px;
				left: 50%;
				transform: translateX(-50%) rotate(-2deg);
				z-index: 10;
			}
			
			.polaroid {
				background: #fdfbf7;
				padding: 16px 16px 30px 16px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
				border-radius: 2px;
				width: 100%;
			}
			
			.reel-container {
				width: 100%;
				aspect-ratio: 4 / 5;
				background: #000;
				overflow: hidden;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			
			video {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}
			
			.caption {
				margin-top: 20px;
				text-align: center;
			}
			
			.caption h1 {
				font-family: 'Brush Script MT', cursive;
				color: #2c2c2c;
				font-size: 1.8rem;
			}
			
			.caption p {
				color: #777;
				font-size: 0.85rem;
				text-transform: uppercase;
				letter-spacing: 2px;
			}
			
			.album-btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				margin-top: 25px;
				padding: 12px 24px;
				background: #ea4335;
				color: white;
				text-decoration: none;
				border-radius: 30px;
				font-size: 0.9rem;
				font-weight: bold;
				width: 60%;
			}
		</style>
	</head>

	<body>

		<div class="page-container">
			<div class="tape"></div>

			<div class="polaroid">
				<div class="reel-container">
					<video id="myReel" muted playsinline autoplay></video>
				</div>

				<div class="caption">
					<p>Chapters close, stories live on</p>
					<p>&lt;/&gt;</p>
				</div>
			</div>

			<a href="https://photos.app.goo.gl/bfzz8yjWr7Tn9tCv7" class="album-btn" target="_blank">
				Open Album
			</a>
		</div>

		<script>
			const TOTAL_VIDEOS = 8;
			const videoElement = document.getElementById('myReel');
			
			function loadRandomVideo() {
				const randomVideoNumber = Math.floor(Math.random() * TOTAL_VIDEOS) + 1;
				
				videoElement.src = `assets/${randomVideoNumber}.mp4`;
				videoElement.load();
			}
			
			// Wait until metadata is ready (safe for Android)
			videoElement.addEventListener('loadedmetadata', () => {
				try {
					const maxStartTime = Math.max(0, videoElement.duration - 5);
					const startPos = Math.random() * maxStartTime;
					
					videoElement.currentTime = startPos;
					} catch (e) {}
					
					videoElement.play().catch(() => {});
					});
					
					// Load next video when current ends
					videoElement.addEventListener('ended', loadRandomVideo);
					
					// Fallback: user tap required on some Android devices
					document.addEventListener('click', () => {
						videoElement.play().catch(() => {});
						}, { once: true });
						
						// Initial load
						window.addEventListener('load', loadRandomVideo);
		</script>
	</body>
</html>
